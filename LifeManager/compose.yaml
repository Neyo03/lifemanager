services:
  lifemanager-db:
    image: postgres:15-alpine
    container_name: lifemanager_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: YourStrongPassword123!
      POSTGRES_DB: lifemanager
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  lifemanager-migration:
    build: .
    image: lifemanager-app:latest
    container_name: lifemanager_migration
    entrypoint: ["./efbundle", "--connection", "Host=lifemanager-db;Database=lifemanager;Username=postgres;Password=YourStrongPassword123!"]
    depends_on:
      lifemanager-db:
        condition: service_healthy

  lifemanager-app:
    build: .
    image: lifemanager-app:latest
    container_name: lifemanager_app
    environment:
      - ConnectionStrings__DefaultConnection=Host=lifemanager-db;Database=lifemanager;Username=postgres;Password=YourStrongPassword123!
    ports:
      - "8080:8080"
    depends_on:
      lifemanager-migration:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata: